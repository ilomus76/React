<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>let const</title>
</head>

<script>
    // ECMAScript 6버전(ES6 버전)에서 등장한 새로운 문법들. (에크마스크립트6)

    //1. 변수 선언 키워드 추가 : let , const

    //기존 선언 키워드 추가 :  let , const

    // 기존의 변수 선언 키워드 var 

    var a =10;

    document.write(a + "<br>");


    // 같은 이름의 변수를 또 선언하면?
    var a =20;  // var 키워드를 무시.. 즉 . .기존 변수의 값 변경됨. 
    document.write ( a + "<br>")

    //실수로 같은 변수 명을 써서 기존 값을 잃어버리는 문제가 발생될 수 있으며.. 인식하기 어려움. 


    // 그래서 새로운 키워드 등장! 

    let b= 100;
    document.write(b + '<br>');


    // 같은 이름의 변수를 만들면... 문법적으로 에러발생 !!!  ---실행조차 안됨. 
    //let b = 200;  // 이부분이 에러라 문법적 에러라 실행조차 안됨.  error. 그래서 내가 이 변수를 사용하면 안되는것을 알수 있음.

    //let도 변수키워드 이기에 값 변경은 가능함.
    b = 200;
    document.write(b + '<br>');


    // 경우에 따라서는 값 변경을 하면 안되는 변수가 필요한 경우도 있음. 
    // 그래서 등장한.. 키워드 --상수화된 변수 
    const PI = 3.14; // 정해져 있는 값  // 값 변경이 불가능한 변수
    document.write('원주율 : ' + PI + '<br>');

    // PI = 5.55 ; // 예외 발생.. 이 위치부터 코드가 멈춤.
    // document.write('원주율 : ' + PI + '<br>');

    // 당연히 같은 이름의 변수선언은 에러!!
    //const PI = 5.55 ; // error

    // 어떤 키워드를 사용할지 모르겠다면.. tip.
    // 이름, 나이 같은 데이터 저장 변수는 let
    // 객체를 참조하는 변수는 const를 권장. 

    // let name ='sam';
    // const in1 = document.getElementById('in1');  // 주소값을 할당....
    // in1.value = name ;

    // -------------

    // var 과 다른 또 다른 특징 ! ( 인식되는 지역의 범위가 다름)
    // var키워드 : 함수{}만 지역으로 인식함
    // let,const 키워드 : 모든 {}를 지역으로 인식함.(대부분의 프로그래밍 언어 방식)

    function aaa(){
        var name = 'sam'; // 지역변수 ~ 함수안에서만 인식되는 변수
        document.write('함수 안: ' + name + '<br>');
    }

    aaa();//함수 호출
    // document.write('함수 밖: ' + name + '<br>') // 인식 안됨.

    //{}를 사용하는 다른 문법 - 조건문
    if(true){
        var age=20; // 지역변수 ?? --아님.. var은 함수 {}만 지역임.
        document.write('조건문 안 : ' + age + '<br>');
    }
    document.write('조건문 밖:'+ age + '<br>');  // 위의 if를 인식못하면 에러남. 이 경우 함수가 아닌 if안에서 설정이 되었기 때문에 인식됨. 

    // 그래서 .. 모든 {}를 지역으로 인식하는 변수 키워드 let, const [더 선호]

    if(true){
        let address='seoul'; // 지역변수임...
        document.write(address + '<br>')
    }
    //document.write(address + '<br>') // error --인식안됨.  -> 이 경우는 let이 {}안에 있기 때문에 무조건 에러.


</script>
<body>
    
</body>
</html>
